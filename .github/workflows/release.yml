name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run package

      - name: Create GitHub Release
        # Pinned to a commit SHA because this third-party action runs with
        # `contents: write`. Bump by resolving a new tag's SHA from GitHub,
        # not by editing the `@v2` tag pointer (which is mutable).
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/com.vsd.craft.heos.sdPlugin.zip
          generate_release_notes: true
